<!DOCTYPE html>

<html lang="en">

<head>
  <base href="/rest-countries-api/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Rest Countries API Frontend Mentor Advanced Challenge">
  <title>Country Details</title>
  <link rel="stylesheet" href="style.css">

  <script>
    // so no flickering occurs when navigating between pages
    const theme = localStorage.getItem("rest-countries-api-theme") || "light";
    document.documentElement.dataset.theme = theme;
  </script>
</head>

<body>
  <header>
    <h1><a href="./">Where in the world?</a></h1>
    <button id="theme-toggle" class="btn" aria-label="Toggle dark mode"></button>

    <div class="loader__container">
      <span class="loader"></span>
    </div>
  </header>

  <main>
    <a href="./" class="back-btn btn">&larr; Back</a>

    <div class="details">
    </div>
  </main>

  <script type="module" src="country/getCountryDetails.js"></script>
  <script type="module" src="scripts/theme.js"></script>
</body>

</html>
