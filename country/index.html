<!DOCTYPE html>

<html>

<head>
  <base href="/rest-countries-api/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Country Details</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
    rel="stylesheet">

  <script>
    // so no flickering occurs when navigating between pages
    const theme = localStorage.getItem("rest-countries-api-theme") || "light";
    document.documentElement.dataset.theme = theme;
  </script>
</head>

<body id="country-details">
  <header>
    <h1><a href="index.html">Where in the world?</a></h1>
    <button id="theme-toggle" aria-label="Toggle dark mode">
      <img id="theme-toggle__icon" class="theme-toggle__icon" src="icons/moon.png" alt="" width="24" height="24"></img>
    </button>

    <div id="loader" class="loader" aria-hidden="false">
      <div class="loader__bar"></div>
    </div>
  </header>

  <main>
    <div class="input-container">
      <a href="index.html" class="btn">&larr; Back</a>
    </div>

    <div class="details">
    </div>
  </main>

  <script type="module" src="country/getCountryDetails.js"></script>
  <script type="module" src="scripts/theme.js"></script>
</body>

</html>
