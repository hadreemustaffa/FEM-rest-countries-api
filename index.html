<!DOCTYPE html>

<html lang="en">

<head>
  <base href="/rest-countries-api/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>REST Countries Challenge</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
    rel="stylesheet">

  <script>
    // so no flickering occurs when navigating between pages
    const theme = localStorage.getItem("rest-countries-api-theme") || "light";
    document.documentElement.dataset.theme = theme;
  </script>
</head>

<body>
  <header>
    <h1><a href="./">Where in the world?</a></h1>
    <button id="theme-toggle" class="btn" aria-label="Toggle dark mode"></button>
  </header>

  <main>
    <div class="container">
      <div class="container__search">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon" aria-hidden="true" viewBox="0 0 512 512">
          <path d="M221.09 64a157.09 157.09 0 10157.09 157.09A157.1 157.1 0 00221.09 64z" fill="none"
            stroke="currentColor" stroke-miterlimit="10" stroke-width="32" />
          <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-miterlimit="10" stroke-width="32"
            d="M338.29 338.29L448 448" />
        </svg>
        <input type="search" class="btn" name="search" id="search" placeholder="Search for a country...">
      </div>

      <div class="container__inner">
        <div class="container__region-select">
          <select class="btn" name="region" id="region-select" autocomplete="off" aria-label="Filter by region">
            <option value="">Filter by Region</option>
            <option value="Africa">Africa</option>
            <option value="Americas">Americas</option>
            <option value="Asia">Asia</option>
            <option value="Europe">Europe</option>
            <option value="Oceania">Oceania</option>
          </select>
          <svg class="icon icon--sm" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" viewBox="0 0 512 512">
            <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="48"
              d="M112 184l144 144 144-144" />
          </svg>
        </div>

        <button type="button" id="shuffle" class="btn" aria-label="shuffle countries button" title="Shuffle Countries">
          <svg xmlns="http://www.w3.org/2000/svg" class="icon" aria-hidden="true" viewBox="0 0 512 512">
            <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="32"
              d="M400 304l48 48-48 48M400 112l48 48-48 48M64 352h85.19a80 80 0 0066.56-35.62L256 256" />
            <path
              d="M64 160h85.19a80 80 0 0166.56 35.62l80.5 120.76A80 80 0 00362.81 352H416M416 160h-53.19a80 80 0 00-66.56 35.62L288 208"
              fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" />
          </svg>
        </button>
      </div>
    </div>

    <ul class="cards">
    </ul>
  </main>

  <script type="module" src="index.js"></script>
  <script type="module" src="scripts/theme.js"></script>
</body>

</html>
