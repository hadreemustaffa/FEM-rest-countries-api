<!DOCTYPE html>

<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>REST Countries Challenge</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
    rel="stylesheet">

  <script>
    // so no flickering occurs when navigating between pages
    const theme = localStorage.getItem("fem-countries-api-theme") || "light";
    document.documentElement.dataset.theme = theme;
  </script>
</head>

<body id="home">
  <header>
    <h1><a href="/">Where in the world?</a></h1>
    <button id="theme-toggle" aria-label="Toggle dark mode">
      <img id="theme-toggle__icon" class="theme-toggle__icon" src="./icons/moon.png" alt="" width="24"
        height="24"></img>
    </button>
  </header>

  <main>
    <div class="input-container">
      <input type="search" name="search" id="search" placeholder="Search for a country...">

      <div class="flex gap-xs">
        <select name="region" id="region">
          <option value="">Filter by Region</option>
          <option value="Africa">Africa</option>
          <option value="Americas">Americas</option>
          <option value="Asia">Asia</option>
          <option value="Europe">Europe</option>
          <option value="Oceania">Oceania</option>
        </select>

        <button type="button" id="shuffle">Shuffle</button>
      </div>
    </div>

    <ul class="cards">
    </ul>
  </main>

  <script type="module" src="./index.js"></script>
  <script type="module" src="./scripts/theme.js"></script>
</body>

</html>
